    {

        { name: "Antiquities on the Loose", colors: "W", note: "3 mana = two 2/2s. 6 mana = two 3/3s + counters. Insane value." },

      tier: "A-Tier — Windmill Slam",
      color: "#C0C0C0",

        { name: "Germination Practicum", colors: "G", note: "Green paradigm mythic — A- tier bomb" },
        { name: "Cyclonic Rift", colors: "U★", note: "Mystical Archive. Overloaded = you win the game." },

        { name: "Slumbering Trudge", colors: "G", note: "Massive stats, hard to deal with" },

  };

  const tabStyle = (isActive) => ({
    flex: "1 0 auto", padding: "10px 10px",
    background: isActive ? "#1e1a2e" : "transparent",
    color: isActive ? "#c9a94e" : "#6a6278",
    border: "none",
    borderBottom: isActive ? "2px solid #c9a94e" : "2px solid transparent",
    fontSize: "11px", fontWeight: isActive ? "700" : "500",
    cursor: "pointer", letterSpacing: "0.3px",
    fontFamily: "inherit", whiteSpace: "nowrap",
  });

    <div style={s.page}>
      {/* Header */}
      <div style={s.header}>
        <div style={s.headerGlow} />
        <div style={s.subtitle}>MTG Pre-Release Cheat Sheet</div>
        <h1 style={s.title}>Secrets of Strixhaven</h1>
        <div style={s.date}>Sealed Format · April 17–23, 2026</div>

          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={tabStyle(activeTab === tab.id)}>

          <div>

            </p>
            {mechanics.map((m, i) => (
              <div key={i} style={s.card}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                  <span style={{ fontSize: "18px" }}>{m.icon}</span>
                  <span style={{ fontSize: "15px", fontWeight: "700", color: "#e8dfd0" }}>{m.name}</span>
                </div>
                <p style={{ fontSize: "13px", color: "#b8b0c4", lineHeight: "1.5", margin: "0 0 6px" }}>{m.desc}</p>
                <div style={s.tipBox}>💡 {m.tip}</div>

          <div>
            <h2 style={s.sectionHeader}>The Five Colleges</h2>

                { name: "Witherbloom", rating: "B", w: "70%" },
                { name: "Lorehold", rating: "B-", w: "62%" },
              ].map((r, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
                  <span style={{ fontSize: "12px", width: "74px", color: "#b8b0c4" }}>{r.name}</span>
                  <div style={{ flex: 1, height: "14px", background: "#0d0f16", borderRadius: "3px", overflow: "hidden" }}>

            {colleges.map((college, idx) => {

                <div key={idx} style={{

                  border: `1px solid ${isOpen ? '#c9a94e44' : '#2a2535'}`,

                  <button
                    onClick={() => setExpandedCollege(isOpen ? null : idx)}
                    style={{

                      color: "#e8dfd0", cursor: "pointer", textAlign: "left",
                      display: "flex", alignItems: "center", gap: "10px",
                      fontFamily: "inherit",
                    }}
                  >
                    <div style={{ display: "flex", gap: "3px" }}>
                      {college.colorDot.map((c, ci) => (
                        <div key={ci} style={{
                          width: "18px", height: "18px", borderRadius: "50%",
                          background: c, border: "1px solid #555",
                        }} />
                      ))}
                    </div>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontSize: "16px", fontWeight: "700" }}>{college.name}</span>
                      <span style={{ fontSize: "12px", color: "#8a8090", marginLeft: "8px" }}>
                        {college.colors} · {college.mechanic}
                      </span>
                    </div>
                    <span style={{
                      fontSize: "14px", fontWeight: "700", color: "#c9a94e",
                      background: "rgba(201,169,78,0.1)", padding: "2px 8px", borderRadius: "4px",

                      {college.rating}
                    </span>
                    <span style={{ color: "#6a6278", fontSize: "16px", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
                  </button>

                  {isOpen && (
                    <div style={{ padding: "0 12px 12px" }}>

                      <p style={{ fontSize: "13px", color: "#b8b0c4", lineHeight: "1.5", margin: "0 0 10px" }}>

                      </p>

                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" }}>
                        <div style={{ background: "rgba(80,200,80,0.06)", padding: "8px", borderRadius: "4px", border: "1px solid rgba(80,200,80,0.15)" }}>
                          <div style={{ fontSize: "11px", color: "#5c5", fontWeight: "700", marginBottom: "4px" }}>✓ STRENGTHS</div>
                          {college.strengths.map((item, si) => (
                            <div key={si} style={{ fontSize: "12px", color: "#a8c8a8", marginBottom: "2px" }}>• {item}</div>

                        <div style={{ background: "rgba(200,80,80,0.06)", padding: "8px", borderRadius: "4px", border: "1px solid rgba(200,80,80,0.15)" }}>

                            <div key={wi} style={{ fontSize: "12px", color: "#c8a8a8", marginBottom: "2px" }}>• {item}</div>
                          ))}
                        </div>
                      </div>

                      <div style={{ fontSize: "11px", textTransform: "uppercase", letterSpacing: "1px", color: "#6a6278", marginBottom: "4px" }}>
                        Key Signpost Cards
                      </div>
                      {college.signposts.map((item, si) => (
                        <div key={si} style={{
                          fontSize: "12px", color: "#d4c8a0", padding: "3px 0",
                          borderBottom: si < college.signposts.length - 1 ? "1px solid #1a1726" : "none",
                        }}>
                          ★ {item}
                        </div>
                      ))}

                      <div style={{ fontSize: "11px", textTransform: "uppercase", letterSpacing: "1px", color: "#6a6278", margin: "10px 0 4px" }}>
                        Top Commons to Draft
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
                        {college.topCommons.map((c, ci) => (
                          <span key={ci} style={{
                            fontSize: "11px", background: "#1e1a2e", color: "#b8b0c4",
                            padding: "3px 8px", borderRadius: "12px", border: "1px solid #2a2535",
                          }}>
                            {c}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ BOMBS ═══ */}
        {activeTab === "bombs" && (
          <div>
            <h2 style={s.sectionHeader}>Bombs & Top Picks by Tier</h2>
            <p style={s.muted}>
              ★ = Mystical Archive card (1 per booster). These are the cards you build around if you open them.
            </p>
            {bombsByTier.map((tier, ti) => (
              <div key={ti} style={{ marginBottom: "16px" }}>
                <div style={{
                  fontSize: "13px", fontWeight: "700", color: tier.color,
                  padding: "6px 0", borderBottom: `1px solid ${tier.color}44`,
                  marginBottom: "8px", letterSpacing: "0.5px",
                }}>
                  {tier.tier}
                </div>
                {tier.cards.map((card, ci) => (
                  <div key={ci} style={{
                    display: "flex", gap: "8px", padding: "8px",
                    background: ci % 2 === 0 ? "rgba(26,23,38,0.6)" : "transparent",
                    borderRadius: "4px",
                  }}>
                    <div style={{ minWidth: "28px", fontSize: "12px", textAlign: "center" }}>
                      {colorEmoji(card.colors.replace("★", ""))}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "13px", fontWeight: "700", color: "#e8dfd0" }}>
                        {card.name} {card.colors.includes("★") && <span style={{ color: "#c9a94e", fontSize: "11px" }}>★ Archive</span>}
                      </div>
                      <div style={{ fontSize: "12px", color: "#8a8090", lineHeight: "1.4" }}>{card.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            ))}

            <div style={{...s.goldBox, marginTop: "8px"}}>
              <div style={{ fontSize: "13px", fontWeight: "700", color: "#c9a94e", marginBottom: "4px" }}>
                🏆 The Emeritus Cycle — Know These Cards
              </div>
              <p style={{ fontSize: "12px", color: "#b8b0c4", lineHeight: "1.5", margin: 0 }}>
                Each color has an Emeritus creature with a classic Alpha spell as its prepared spell.
                Truce (W) = Swords to Plowshares, Ideation (U) = Ancestral Recall,
                Woe (B) = Demonic Tutor, Conflict (R) = Lightning Bolt,
                Abundance (G) = Regrowth. ALL are first-pickable.
              </p>
            </div>
          </div>
        )}

        {/* ═══ AVOID ═══ */}
        {activeTab === "avoid" && (
          <div>
            <h2 style={s.sectionHeader}>Cards to Avoid</h2>
            <p style={s.muted}>
              These look tempting but underperform in Sealed/Draft. ★ = Mystical Archive, ★★ = Special Guest. Famous names ≠ limited playable.
            </p>
            {avoidCards.map((card, i) => (
              <div key={i} style={{
                display: "flex", gap: "8px", padding: "8px",
                background: i % 2 === 0 ? "rgba(200,80,80,0.04)" : "transparent",
                borderRadius: "4px",
                borderLeft: "2px solid #c5555544",
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "13px", fontWeight: "700", color: "#d4a0a0" }}>
                    {card.name} <span style={{ fontSize: "11px", color: "#6a6278" }}>({card.colors})</span>
                  </div>
                  <div style={{ fontSize: "12px", color: "#8a8090", lineHeight: "1.4" }}>{card.reason}</div>
                </div>
                <div style={{
                  fontSize: "10px", color: "#c55", fontWeight: "700",
                  background: "rgba(200,80,80,0.1)", padding: "2px 6px",
                  borderRadius: "4px", alignSelf: "flex-start", whiteSpace: "nowrap",
                }}>
                  TRAP
                </div>
              </div>
            ))}

            <div style={{...s.redBox, marginTop: "12px"}}>
              <div style={{ fontSize: "13px", fontWeight: "700", color: "#d4a0a0", marginBottom: "4px" }}>
                ⚠️ Mystical Archive Trap Warning
              </div>
              <p style={{ fontSize: "12px", color: "#b8b0c4", lineHeight: "1.5", margin: 0 }}>
                Many iconic Constructed staples (Force of Will, Flusterstorm, Pyretic Ritual, Brain Freeze) are near-unplayable in Limited.
                Don't let name recognition fool you — evaluate every card for THIS format, not its Legacy reputation.
              </p>
            </div>
          </div>
        )}

        {/* ═══ TIPS ═══ */}
        {activeTab === "tips" && (
          <div>
            <h2 style={s.sectionHeader}>Sealed Deckbuilding Tips</h2>
            {sealedTips.map((tip, i) => (
              <div key={i} style={s.card}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                  <span style={{ fontSize: "18px" }}>{tip.icon}</span>
                  <span style={{ fontSize: "14px", fontWeight: "700", color: "#e8dfd0" }}>{tip.title}</span>
                </div>
                <p style={{ fontSize: "13px", color: "#b8b0c4", lineHeight: "1.5", margin: 0 }}>{tip.text}</p>
              </div>
            ))}

            <div style={{...s.goldBox, marginTop: "8px"}}>
              <div style={{ fontSize: "13px", fontWeight: "700", color: "#c9a94e", marginBottom: "6px" }}>
                📋 Quick Deckbuilding Checklist
              </div>
              {[
                "Sort all cards by color, then identify deepest 2-color pair",
                "Pull ALL removal spells — these are your most important cards",
                "Identify bombs/rares that pull you toward a college",
                "Check for prepared spell creatures — count them as half-spell",
                "Ensure 15-18 creatures + 5-8 non-creature spells",
                "Include 17 lands (16 if very low curve, 18 if splashing)",
                "Pick up ALL dual lands and fixing in your colors",
                "Cut your weakest cards — better a tight 40 than a padded 45",
              ].map((item, i) => (
                <div key={i} style={{
                  fontSize: "12px", color: "#b8b0c4", padding: "4px 0",
                  borderBottom: i < 7 ? "1px solid #1e1a2e" : "none",
                  display: "flex", gap: "6px",
                }}>
                  <span style={{ color: "#c9a94e", fontWeight: "700" }}>☐</span> {item}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{
        textAlign: "center", padding: "16px",
        fontSize: "10px", color: "#4a4258",
        borderTop: "1px solid #1e1a2e",
      }}>
        Sources: Draftsim (Set Review & Prerelease Guide) · Card Game Base (Tier List) · The Gamer · MTG Rocks
        <br/>Data compiled pre-release — adjust based on gameplay experience
        <br/>Brought to you by geilepaste and his homie claude
      </div>
    </div>
  );
};

ReactDOM.render(<SOSCheatSheet />, document.getElementById('root'));
</script>
</body>
</html>
